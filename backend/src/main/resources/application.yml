spring:
  application:
    name: crawling

  profiles:
    active: prod   # 로컬 실행 시 dev 프로파일, 서버 배포 시 prod로 변경

  sql:
    init:
      mode: never

mybatis:
  mapper-locations: classpath:mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true
  type-aliases-package: briefing.crawling.dto

rss:
  url: 'https://news.google.com/rss/search?q=%EC%9D%80%ED%96%89+when:7d&hl=ko&gl=KR&ceid=KR:ko'

ai:
  prompt: '아래 링크와 제목의 기사를 확인하고, 다른 설명 없이 바로 <ul>, <li> 태그를 사용한 5줄 요약 HTML 결과만 출력해. (No prose, No intro, No outro)'

---
# prod
spring:
  config:
    activate:
      on-profile: prod

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      schema: ${DB_SCHEMA}
      maximum-pool-size: 10
      connection-timeout: 30000

server:
  port: 8080
  error:
    include-stacktrace: never
    include-message: never

logging:
  level:
    root: WARN
    briefing.crawling: INFO
  file:
    name: /var/log/crawling/application.log

ai:
  key: ${GEMINI_API_KEY}

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS}
